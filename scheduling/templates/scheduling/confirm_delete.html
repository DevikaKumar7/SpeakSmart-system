{% extends "base.html" %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div class="confirm-box">
<div class="card">
    <div class="card-header" style="background:#fef2f2;border-color:#fecaca"><h3>⚠️ Confirm Deletion</h3></div>
    <div class="card-body">
        <p style="margin-bottom:20px;font-size:.95rem">Are you sure you want to permanently delete <strong>"{{ obj }}"</strong>? This action cannot be undone.</p>
        <form method="post" style="display:flex;gap:10px">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">🗑 Yes, Delete</button>
            <button type="button" onclick="history.back()" class="btn btn-secondary">Cancel</button>
        </form>
    </div>
</div>
</div>
{% endblock %}
